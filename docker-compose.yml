version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gym_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sql
      POSTGRES_DB: DbGym
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d DbGym"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym_backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:sql@postgres:5432/DbGym?schema=public
      - JWT_SECRET=mi_secreto_super_seguro_gym_2024
      - JWT_EXPIRATION=1d
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
      - MERCADOPAGO_WEBHOOK_SECRET=your_mercadopago_secret_here
      - CULQI_WEBHOOK_SECRET=your_culqi_secret_here
    depends_on:
      postgres:
        condition: service_healthy
    # Uncomment the next line to run Prisma migrations automatically before starting the backend
    # command: sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  postgres_data: